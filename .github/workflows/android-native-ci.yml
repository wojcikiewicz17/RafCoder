name: android-native-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JAVA_VERSION: '17'
      HAS_SIGNING_SECRETS: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.14.3

      - name: Build unsigned debug
        run: |
          gradle -p android --no-daemon :app:assembleDebug

      - name: Build unsigned release
        run: |
          gradle -p android --no-daemon :app:assembleRelease

      - name: Stage unsigned debug APK artifacts
        run: |
          mkdir -p android/artifacts/debug
          cp -v android/app/build/outputs/apk/debug/*.apk android/artifacts/debug/

      - name: Stage unsigned release APK artifacts
        run: |
          mkdir -p android/artifacts/unsigned-release
          cp -v android/app/build/outputs/apk/release/*.apk android/artifacts/unsigned-release/

      - name: Build unsigned release
        run: |
          gradle -p android --no-daemon :app:assembleRelease

      - name: Collect unsigned release APKs
        run: |
          mkdir -p android/artifacts/unsigned-release
          cp android/app/build/outputs/apk/release/*.apk android/artifacts/unsigned-release/

      - name: Decode keystore
        if: ${{ env.HAS_SIGNING_SECRETS == 'true' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/android/release.keystore

      - name: Build signed release
        if: ${{ env.HAS_SIGNING_SECRETS == 'true' }}
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          gradle -p android --no-daemon :app:clean :app:assembleRelease

      - name: Stage signed APK artifacts
        if: ${{ env.HAS_SIGNING_SECRETS == 'true' }}
        run: |
          mkdir -p android/artifacts/signed-release
          cp -v android/app/build/outputs/apk/release/*.apk android/artifacts/signed-release/

      - name: Verify signed release certificates
        if: ${{ env.HAS_SIGNING_SECRETS == 'true' }}
        run: |
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n1)
          for apk in android/artifacts/signed-release/*.apk; do
            echo "Validating signature for $apk"
            "$APKSIGNER" verify --print-certs "$apk"
          done

      - name: Upload debug APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rafcoder-apk-debug
          path: |
            android/artifacts/debug/*.apk

      - name: Upload unsigned release APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rafcoder-apk-release-unsigned
          path: |
            android/artifacts/unsigned-release/*.apk

      - name: Upload signed release APK artifacts
        if: ${{ env.HAS_SIGNING_SECRETS == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: rafcoder-apk-release-signed
          path: |
            android/artifacts/signed-release/*.apk
