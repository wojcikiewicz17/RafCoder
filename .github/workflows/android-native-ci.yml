name: android-native-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JAVA_VERSION: '17'
      REQUIRED_ABIS: 'armeabi-v7a arm64-v8a'
      HAS_SIGNING_SECRETS: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build unsigned binaries (debug + release)
        run: |
          ./scripts/android_build_matrix.sh

      - name: Compute ABI outputs (debug/release)
        id: abi_outputs
        run: |
          set -euo pipefail

          DEBUG_LIB_ROOT="android/app/build/intermediates/merged_native_libs/debug/mergeDebugNativeLibs/out/lib"
          RELEASE_LIB_ROOT="android/app/build/intermediates/merged_native_libs/release/mergeReleaseNativeLibs/out/lib"

          for abi in ${REQUIRED_ABIS}; do
            debug_dir="${DEBUG_LIB_ROOT}/${abi}"
            release_dir="${RELEASE_LIB_ROOT}/${abi}"

            debug_has="false"
            release_has="false"

            if [[ -d "$debug_dir" ]] && find "$debug_dir" -maxdepth 1 -type f -name '*.so' -print -quit | grep -q .; then
              debug_has="true"
            fi

            if [[ -d "$release_dir" ]] && find "$release_dir" -maxdepth 1 -type f -name '*.so' -print -quit | grep -q .; then
              release_has="true"
            fi

            safe_abi="${abi//-/_}"
            echo "debug_${safe_abi}_present=${debug_has}" >> "$GITHUB_OUTPUT"
            echo "release_${safe_abi}_present=${release_has}" >> "$GITHUB_OUTPUT"
            echo "debug_${safe_abi}_dir=${debug_dir}" >> "$GITHUB_OUTPUT"
            echo "release_${safe_abi}_dir=${release_dir}" >> "$GITHUB_OUTPUT"
          done

      - name: Validate native libs per ABI (debug/release)
        run: |
          set -euo pipefail

          DEBUG_LIB_ROOT="android/app/build/intermediates/merged_native_libs/debug/mergeDebugNativeLibs/out/lib"
          RELEASE_LIB_ROOT="android/app/build/intermediates/merged_native_libs/release/mergeReleaseNativeLibs/out/lib"

          validate_variant() {
            local variant="$1"
            local root="$2"

            echo "### ${variant} native libs at ${root}"
            test -d "$root"

            local abi
            for abi in ${REQUIRED_ABIS}; do
              local abi_dir="${root}/${abi}"
              echo "Checking ${variant} ABI: ${abi}"
              test -d "$abi_dir"
              find "$abi_dir" -maxdepth 1 -type f -name '*.so' -print | sort
              test -n "$(find "$abi_dir" -maxdepth 1 -type f -name '*.so' -print -quit)"
            done
          }

          validate_variant debug "$DEBUG_LIB_ROOT"
          validate_variant release "$RELEASE_LIB_ROOT"

          [[ "${{ steps.abi_outputs.outputs.debug_armeabi_v7a_present }}" == "true" ]] || { echo "Missing debug .so for armeabi-v7a"; exit 1; }
          [[ "${{ steps.abi_outputs.outputs.debug_arm64_v8a_present }}" == "true" ]] || { echo "Missing debug .so for arm64-v8a"; exit 1; }
          [[ "${{ steps.abi_outputs.outputs.release_armeabi_v7a_present }}" == "true" ]] || { echo "Missing release .so for armeabi-v7a"; exit 1; }
          [[ "${{ steps.abi_outputs.outputs.release_arm64_v8a_present }}" == "true" ]] || { echo "Missing release .so for arm64-v8a"; exit 1; }

          echo "ABI output flags validated successfully."

      - name: Stage unsigned APK artifacts by ABI
        run: |
          set -euo pipefail
          mkdir -p android/artifacts/debug android/artifacts/unsigned-release

          for abi in ${REQUIRED_ABIS}; do
            debug_apk="android/app/build/outputs/apk/debug/app-${abi}-debug.apk"
            unsigned_release_apk="android/app/build/outputs/apk/release/app-${abi}-release-unsigned.apk"

            test -f "$debug_apk"
            test -f "$unsigned_release_apk"

            cp -v "$debug_apk" "android/artifacts/debug/rafcoder-${abi}-debug.apk"
            cp -v "$unsigned_release_apk" "android/artifacts/unsigned-release/rafcoder-${abi}-release-unsigned.apk"
          done

          ls -lah android/artifacts/debug
          ls -lah android/artifacts/unsigned-release

      - name: Decode keystore
        if: ${{ env.HAS_SIGNING_SECRETS == 'true' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/android/release.keystore

      - name: Build signed release binary
        if: ${{ env.HAS_SIGNING_SECRETS == 'true' }}
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./android/gradlew -p android --no-daemon :app:clean :app:assembleRelease

      - name: Stage signed APK artifacts by ABI
        if: ${{ env.HAS_SIGNING_SECRETS == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p android/artifacts/signed-release

          for abi in ${REQUIRED_ABIS}; do
            signed_apk="android/app/build/outputs/apk/release/app-${abi}-release.apk"
            test -f "$signed_apk"
            cp -v "$signed_apk" "android/artifacts/signed-release/rafcoder-${abi}-release-signed.apk"
          done

          test -z "$(find android/artifacts/signed-release -maxdepth 1 -type f -name '*-unsigned.apk' -print -quit)"
          ls -lah android/artifacts/signed-release

      - name: Upload debug APK artifacts (armeabi-v7a)
        uses: actions/upload-artifact@v4
        with:
          name: rafcoder-apk-debug-armeabi-v7a
          path: android/artifacts/debug/rafcoder-armeabi-v7a-debug.apk

      - name: Upload debug APK artifacts (arm64-v8a)
        uses: actions/upload-artifact@v4
        with:
          name: rafcoder-apk-debug-arm64-v8a
          path: android/artifacts/debug/rafcoder-arm64-v8a-debug.apk

      - name: Upload unsigned release APK artifacts (armeabi-v7a)
        uses: actions/upload-artifact@v4
        with:
          name: rafcoder-apk-release-unsigned-armeabi-v7a
          path: android/artifacts/unsigned-release/rafcoder-armeabi-v7a-release-unsigned.apk

      - name: Upload unsigned release APK artifacts (arm64-v8a)
        uses: actions/upload-artifact@v4
        with:
          name: rafcoder-apk-release-unsigned-arm64-v8a
          path: android/artifacts/unsigned-release/rafcoder-arm64-v8a-release-unsigned.apk

      - name: Upload signed release APK artifacts (armeabi-v7a)
        if: ${{ env.HAS_SIGNING_SECRETS == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: rafcoder-apk-release-signed-armeabi-v7a
          path: android/artifacts/signed-release/rafcoder-armeabi-v7a-release-signed.apk

      - name: Upload signed release APK artifacts (arm64-v8a)
        if: ${{ env.HAS_SIGNING_SECRETS == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: rafcoder-apk-release-signed-arm64-v8a
          path: android/artifacts/signed-release/rafcoder-arm64-v8a-release-signed.apk
