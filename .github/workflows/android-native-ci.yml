name: android-native-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JAVA_VERSION: '17'
      HAS_SIGNING_SECRETS: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Bootstrap Gradle wrapper jar
        run: |
          mkdir -p android/gradle/wrapper
          if [ ! -f android/gradle/wrapper/gradle-wrapper.jar ]; then
            curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar -o android/gradle/wrapper/gradle-wrapper.jar
          fi

      - name: Build unsigned binaries (debug + release)
        run: |
          ./android/gradlew -p android --no-daemon clean :app:assembleDebug :app:assembleRelease

      - name: Stage unsigned APK artifacts
        run: |
          mkdir -p android/artifacts/unsigned
          cp -v android/app/build/outputs/apk/debug/*.apk android/artifacts/unsigned/
          cp -v android/app/build/outputs/apk/release/*unsigned*.apk android/artifacts/unsigned/
          ls -lah android/artifacts/unsigned

      - name: Decode keystore
        if: ${{ env.HAS_SIGNING_SECRETS == 'true' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/android/release.keystore

      - name: Build signed release binary
        if: ${{ env.HAS_SIGNING_SECRETS == 'true' }}
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./android/gradlew -p android --no-daemon :app:clean :app:assembleRelease

      - name: Stage signed APK artifacts
        if: ${{ env.HAS_SIGNING_SECRETS == 'true' }}
        run: |
          mkdir -p android/artifacts/signed
          cp -v android/app/build/outputs/apk/release/*release*.apk android/artifacts/signed/
          ls -lah android/artifacts/signed

      - name: Upload unsigned APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rafcoder-android-apks-unsigned
          path: |
            android/artifacts/unsigned/*.apk

      - name: Upload signed APK artifacts
        if: ${{ env.HAS_SIGNING_SECRETS == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: rafcoder-android-apks-signed
          path: |
            android/artifacts/signed/*.apk
